# 生产环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gorp-prod

resources:
  - ../base
  - hpa.yaml
  - ingress.yaml

# 生产环境镜像
images:
  - name: gorp-service
    newName: your-registry/gorp-service
    newTag: v1.0.0

# 生产环境配置覆盖
configMapGenerator:
  - name: gorp-config
    behavior: merge
    literals:
      - APP_ENV=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json

# 生产环境部署配置
patchesStrategicMerge:
  - deployment-patch.yaml