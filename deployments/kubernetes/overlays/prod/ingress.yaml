# Ingress 配置
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gorp-service-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - api.example.com
      secretName: gorp-service-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gorp-service
                port:
                  number: 80

---
# gRPC Ingress（需要 nginx ingress grpc 支持）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gorp-service-grpc-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
spec:
  tls:
    - hosts:
        - grpc.example.com
      secretName: gorp-service-grpc-tls
  rules:
    - host: grpc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gorp-service
                port:
                  number: 9090