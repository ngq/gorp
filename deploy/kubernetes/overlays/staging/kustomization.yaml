# 预发布环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gorp-staging

resources:
  - ../../base

# 预发布环境镜像
images:
  - name: gorp-service
    newName: your-registry/gorp-service
    newTag: staging

# 预发布环境配置覆盖
configMapGenerator:
  - name: gorp-config
    behavior: merge
    literals:
      - APP_ENV=staging
      - LOG_LEVEL=info
      - LOG_FORMAT=json

# 预发布环境部署配置
patches:
  - path: deployment-patch.yaml
