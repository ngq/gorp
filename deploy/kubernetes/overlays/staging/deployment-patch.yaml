# 预发布环境 Deployment 补丁
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gorp-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: gorp-service
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory