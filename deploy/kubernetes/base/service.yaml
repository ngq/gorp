# Service 配置
apiVersion: v1
kind: Service
metadata:
  name: gorp-service
  labels:
    app.kubernetes.io/name: gorp-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: gorp-service

---
# Headless Service（用于服务发现）
apiVersion: v1
kind: Service
metadata:
  name: gorp-service-headless
  labels:
    app.kubernetes.io/name: gorp-service
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: gorp-service