# Kustomization 基础配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml

labels:
  - pairs:
      app.kubernetes.io/name: gorp-service
      app.kubernetes.io/part-of: gorp
    includeSelectors: true

# 镜像配置（由 overlay 覆盖）
images:
  - name: gorp-service
    newName: gorp-service
    newTag: latest
