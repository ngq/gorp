# Secret 模板（生产环境需要用实际值替换）
# 说明：这里只放敏感配置占位，不提供可直接用于生产的默认值。
# 使用方法: kubectl create secret generic gorp-secret --from-literal=DB_DSN=xxx --from-literal=REDIS_ADDR=xxx
apiVersion: v1
kind: Secret
metadata:
  name: gorp-secret
type: Opaque
stringData:
  # 数据库连接字符串（必须替换）
  DB_DSN: "root:password@tcp(mysql:3306)/gorp?charset=utf8mb4&parseTime=True&loc=Local"

  # Redis 地址（必须替换）
  REDIS_ADDR: "redis:6379"
  REDIS_PASSWORD: ""

  # JWT 密钥（必须替换）
  JWT_SECRET: "your-jwt-secret-key-change-this"

  # 服务间认证密钥（必须替换）
  SERVICE_AUTH_KEY: "your-service-auth-key-change-this"

---
# TLS Secret（需要用实际证书替换）
# 使用方法: kubectl create secret tls gorp-service-tls --cert=path/to/cert --key=path/to/key
apiVersion: v1
kind: Secret
metadata:
  name: gorp-service-tls
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""