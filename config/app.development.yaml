database:
  driver: "sqlite"
  backend: "gorm" # gorm|sqlx|ent（当前默认仍建议 gorm；ent 后续接入）
  dsn: "file:demo.db?cache=shared&mode=rwc"
  max_open_conns: 10
  max_idle_conns: 5

redis:
  addr: "127.0.0.1:6379"
  db: 0
  password: ""

# SSH deploy (v1)
ssh:
  timeout_sec: 10
  hosts:
    web-01:
      host: "127.0.0.1"
      port: 22
      username: "root"
      # password: "123456" # 可选：密码认证
      key_path: "~/.ssh/id_rsa"
      known_hosts: "~/.ssh/known_hosts"

deploy:
  remote_folder: "/opt/gorp-demo"
  connections:
    - "web-01"
  frontend:
    pre_action: []
    post_action: []
  backend:
    goos: "linux"
    goarch: "amd64"
    pre_action: []
    post_action: []

swagger:
  enable: true
  basic_auth:
    enable: false

auth:
  jwt:
    secret: "dev-jwt-secret"

dev:
  port: "8070"
  backend:
    refresh_time: 1
    port: "8072"
    monitor_folder: ""
  frontend:
    port: "8071"
