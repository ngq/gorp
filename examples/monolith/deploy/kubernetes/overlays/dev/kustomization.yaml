# 开发环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monolith-dev

resources:
  - ../../base

images:
  - name: your-registry/monolith
    newName: monolith
    newTag: dev

configMapGenerator:
  - name: monolith-config
    behavior: merge
    literals:
      - APP_ENV=dev
      - LOG_LEVEL=debug
      - LOG_FORMAT=console

patches:
  - path: deployment-patch.yaml
