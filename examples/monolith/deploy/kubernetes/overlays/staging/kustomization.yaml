# 预发布环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monolith-staging

resources:
  - ../../base

images:
  - name: your-registry/monolith
    newName: your-registry/monolith
    newTag: staging

configMapGenerator:
  - name: monolith-config
    behavior: merge
    literals:
      - APP_ENV=staging
      - LOG_LEVEL=info
      - LOG_FORMAT=json

patches:
  - path: deployment-patch.yaml
