# Kustomization 基础配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml

labels:
  - pairs:
      app.kubernetes.io/name: monolith
      app.kubernetes.io/part-of: monolith
    includeSelectors: true

images:
  - name: your-registry/monolith
    newName: your-registry/monolith
    newTag: latest
