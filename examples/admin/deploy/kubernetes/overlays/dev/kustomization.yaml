# 开发环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: admin-dev

resources:
  - ../../base

images:
  - name: your-registry/admin
    newName: admin
    newTag: dev

configMapGenerator:
  - name: admin-config
    behavior: merge
    literals:
      - APP_ENV=dev
      - LOG_LEVEL=debug
      - LOG_FORMAT=console

patches:
  - path: deployment-patch.yaml
