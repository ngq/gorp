# 预发布环境 Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: admin-staging

resources:
  - ../../base

images:
  - name: your-registry/admin
    newName: your-registry/admin
    newTag: staging

configMapGenerator:
  - name: admin-config
    behavior: merge
    literals:
      - APP_ENV=staging
      - LOG_LEVEL=info
      - LOG_FORMAT=json

patches:
  - path: deployment-patch.yaml
