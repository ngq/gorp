apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grpc-demo-dev

resources:
  - ../../base

images:
  - name: your-registry/grpc-demo-user-service
    newName: grpc-demo-user-service
    newTag: dev
  - name: your-registry/grpc-demo-order-service
    newName: grpc-demo-order-service
    newTag: dev
  - name: your-registry/grpc-demo-product-service
    newName: grpc-demo-product-service
    newTag: dev

patches:
  - path: deployment-patch.yaml
