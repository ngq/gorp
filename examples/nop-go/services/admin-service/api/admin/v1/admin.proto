syntax = "proto3";

package admin.v1;

option go_package = "nop-go/services/admin-service/api/admin/v1;adminv1";

// Messages generated from Go types

// GetDiscountReq 获取优惠规则请求
message GetDiscountReq {
  uint32 id = 1; // 优惠ID
}

// GetDiscountResp 获取优惠规则响应
message GetDiscountResp {
  uint32 id = 1; // 优惠ID
  string name = 2; // 优惠名称
  string code = 3; // 优惠码
  int32 type = 4; // 优惠类型:0-百分比,1-固定金额
  double value = 5; // 优惠值
  double min_amount = 6; // 最低消费金额
  double max_discount = 7; // 最大优惠金额
  string start_time = 8; // 生效开始时间
  string end_time = 9; // 生效结束时间
  int32 total_quota = 10; // 总使用限额
  int32 used_quota = 11; // 已使用次数
  int32 per_user_limit = 12; // 每人使用限额
  int32 status = 13; // 状态:0-禁用,1-启用
  string description = 14; // 描述
}

// GetDiscountByCodeReq 根据优惠码获取请求
message GetDiscountByCodeReq {
  string code = 1; // 优惠码
}

// CheckPermissionReq 检查权限请求
message CheckPermissionReq {
  uint32 role_id = 1; // 角色ID
  string resource = 2; // 资源标识
  string action = 3; // 操作:read/write/delete
}

// CheckPermissionResp 检查权限响应
message CheckPermissionResp {
  bool allowed = 1; // 是否允许
  string effect = 2; // 效果:allow/deny
}

// AdminRPC 管理服务 gRPC 接口 —— 定义其他服务（trade-service）需要跨服务调用的方法。
// trade-service 结算时需要调用 GetDiscount 和 GetDiscountByCode，
// admin 权限检查需要调用 CheckPermission（未来 gateway 也可使用）。
// 注意：税率查询（GetTaxRate）属于 trade-service 自身，不在 admin-service 中。
service AdminRPC {
  // GetDiscount 根据 ID 获取优惠规则（trade 结算时计算折扣）
  rpc GetDiscount(GetDiscountReq) returns (GetDiscountResp);
  // GetDiscountByCode 根据优惠码获取优惠规则（trade 结算时验证优惠码）
  rpc GetDiscountByCode(GetDiscountByCodeReq) returns (GetDiscountResp);
  // CheckPermission 检查权限（admin 权限检查、gateway 接口鉴权）
  rpc CheckPermission(CheckPermissionReq) returns (CheckPermissionResp);
}
