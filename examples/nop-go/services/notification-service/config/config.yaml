app:
  name: notification-service
  env: development
  address: ":8009"

database:
  driver: mysql
  dsn: "root:nop123456@tcp(mysql:3306)/nop_notification?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: "redis:6379"
  password: ""
  db: 0

log:
  level: debug

discovery:
  enabled: false
  type: consul
  consul:
    addr: "consul:8500"
    service_name: "notification-service"

# 通知配置
notification:
  email:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    username: ""
    password: ""
    from: "noreply@example.com"
  sms:
    provider: "aliyun"
    access_key: ""
    secret_key: ""
    sign_name: ""