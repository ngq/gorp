syntax = "proto3";

package trade.v1;

option go_package = "nop-go/services/trade-service/api/trade/v1;tradev1";

// Messages generated from Go types

// GetOrderReq 获取订单请求
message GetOrderReq {
  string id = 1; // 订单ID
}

// GetOrderResp 获取订单响应
message GetOrderResp {
  string id = 1; // 订单ID
  string user_id = 2; // 用户ID
  string status = 3; // 订单状态
  double total_amount = 4; // 订单总额
  string currency = 5; // 货币
  string shipping_addr = 6; // 收货地址
  string payment_method = 7; // 支付方式
  string created_at = 8; // 创建时间
  string updated_at = 9; // 更新时间
}

// TradeRPC 交易服务 gRPC 接口 —— 定义其他服务可能需要跨服务调用的方法。
// 当前暂只有 GetOrder 供 gateway 或其他服务查询订单状态，后续可扩展。
service TradeRPC {
  // GetOrder 根据 ID 获取订单信息（供 gateway 查询订单状态）
  rpc GetOrder(GetOrderReq) returns (GetOrderResp);
}
