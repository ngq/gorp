syntax = "proto3";

package user.v1;

option go_package = "nop-go/services/user-service/api/user/v1;userv1";

// Messages generated from Go types

// GetUserReq 获取用户请求
message GetUserReq {
  uint32 id = 1; // 用户ID
}

// GetUserResp 获取用户响应
message GetUserResp {
  uint32 id = 1; // 用户ID
  string username = 2; // 用户名
  string email = 3; // 邮箱
  string phone = 4; // 手机号
  string nickname = 5; // 昵称
  string avatar = 6; // 头像URL
  int32 status = 7; // 状态
  string created_at = 8; // 创建时间
  string updated_at = 9; // 更新时间
}

// ListUserAddressesReq 获取用户地址列表请求
message ListUserAddressesReq {
  uint32 user_id = 1; // 用户ID
}

// ListUserAddressesResp 获取用户地址列表响应
message ListUserAddressesResp {
  repeated AddressItem items = 1; // 地址列表
}

// AddressItem 地址条目
message AddressItem {
  uint32 id = 1; // 地址ID
  uint32 user_id = 2; // 用户ID
  string recipient_name = 3; // 收件人姓名
  string phone = 4; // 收件人电话
  string province = 5; // 省份
  string city = 6; // 城市
  string district = 7; // 区县
  string detail = 8; // 详细地址
  bool is_default = 9; // 是否默认地址
}

// UserRPC 用户服务 gRPC 接口 —— 定义其他服务（trade-service、admin-service）需要跨服务调用的方法。
service UserRPC {
  // GetUser 根据 ID 获取用户基本信息（trade 结算时验证客户、admin 权限检查时获取用户角色）
  rpc GetUser(GetUserReq) returns (GetUserResp);
  // ListUserAddresses 获取用户地址列表（trade 结算时获取收货地址）
  rpc ListUserAddresses(ListUserAddressesReq) returns (ListUserAddressesResp);
}
