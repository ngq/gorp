app:
  name: customer-service
  env: development
  address: ":8002"

database:
  driver: mysql
  dsn: "root:nop123456@tcp(mysql:3306)/nop_customer?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: "redis:6379"
  password: ""
  db: 0

log:
  level: debug

# 服务发现配置
discovery:
  enabled: false
  type: consul
  consul:
    addr: "consul:8500"
    service_name: "customer-service"
    health_check_interval: "10s"

# 服务间通信地址
services:
  notification: "http://notification:8009"

# 认证配置（使用 framework 级 auth.jwt 配置）
auth:
  jwt:
    secret: "your-secret-key"
    issuer: "customer-service"
    audience: "customer"
  password_min_length: 6