app:
  name: cart-service
  env: development
  address: ":8004"

database:
  driver: mysql
  dsn: "root:nop123456@tcp(mysql:3306)/nop_cart?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: "redis:6379"
  password: ""
  db: 0

log:
  level: debug

discovery:
  enabled: false
  type: consul
  consul:
    addr: "consul:8500"
    service_name: "cart-service"

services:
  catalog: "http://catalog:8003"
  customer: "http://customer:8002"
  inventory: "grpc://inventory:8008"
  price: "grpc://price:8011"

# 认证配置（使用 framework 级 auth.jwt 配置）
auth:
  jwt:
    secret: "your-secret-key"
    issuer: "cart-service"
    audience: "customer"