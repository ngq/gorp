# 中文说明: AI服务配置
# AI聊天、商品推荐、搜索建议、内容生成

app:
  name: ai-service
  mode: debug

http:
  addr: :8020

database:
  driver: mysql
  dsn: root:nop123456@tcp(mysql:3306)/nop_ai?charset=utf8mb4&parseTime=True&loc=Local

auth:
  jwt:
    secret: your-secret-key
    issuer: nop-go
    audience: nop-go-users

# AI配置
ai:
  # AI提供商: openai/azure/custom
  provider: openai
  # API密钥
  api_key: ""
  # API端点（Azure或自定义）
  api_endpoint: ""
  # 默认模型
  model: gpt-4
  # 最大tokens
  max_tokens: 4096
  # 温度参数
  temperature: 0.7
  # 超时时间(秒)
  timeout: 30