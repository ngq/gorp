# nop-go 监控栈 Docker Compose 配置
# 包含：服务发现(Consul)、链路追踪(Jaeger)、监控(Prometheus+Grafana)
#
# 使用方法:
#   docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  # ========== 服务发现 ==========

  # Consul 服务发现与配置中心
  consul:
    image: docker.m.daocloud.io/library/consul:1.15
    container_name: nop-consul
    restart: unless-stopped
    ports:
      - "8500:8500"      # HTTP API
      - "8600:8600/udp"  # DNS
    command: agent -server -bootstrap-expect=1 -ui -datacenter=nop -client=0.0.0.0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nop-network

  # ========== 链路追踪 ==========

  # Jaeger 分布式追踪
  jaeger:
    image: docker.m.daocloud.io/jaegertracing/all-in-one:1.53
    container_name: nop-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - jaeger_data:/tmp
    networks:
      - nop-network

  # ========== 监控告警 ==========

  # Prometheus 监控
  prometheus:
    image: docker.m.daocloud.io/library/prometheus:v2.49.1
    container_name: nop-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nop-network

  # Grafana 可视化
  grafana:
    image: docker.m.daocloud.io/library/grafana:10.2.3
    container_name: nop-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=nop123456
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_ALERTING_ENABLED=true
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nop-network

  # Alertmanager 告警管理
  alertmanager:
    image: docker.m.daocloud.io/library/alertmanager:v0.26.0
    container_name: nop-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - nop-network

networks:
  nop-network:
    driver: bridge

volumes:
  consul_data:
  jaeger_data:
  prometheus_data:
  grafana_data:
  alertmanager_data: