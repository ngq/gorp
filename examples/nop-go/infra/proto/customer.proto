syntax = "proto3";

package nopgo.customer;

option go_package = "nop-go/infra/pb/customer";

// CustomerService 客户服务
//
// 中文说明:
// - 客户验证;
// - 获取客户信息;
// - 地址管理。
service CustomerService {
  // ValidateCustomer 验证客户
  //
  // 中文说明:
  // - 订单创建前验证客户状态;
  // - 检查客户是否有效、未被封禁。
  rpc ValidateCustomer(ValidateCustomerRequest) returns (ValidateCustomerResponse);

  // GetCustomer 获取客户信息
  rpc GetCustomer(GetCustomerRequest) returns (GetCustomerResponse);

  // GetCustomerAddresses 获取客户地址
  rpc GetCustomerAddresses(GetCustomerAddressesRequest) returns (GetCustomerAddressesResponse);
}

message ValidateCustomerRequest {
  uint64 customer_id = 1;
}

message ValidateCustomerResponse {
  bool valid = 1;
  string error_message = 2;
  uint64 customer_role_id = 3;
}

message GetCustomerRequest {
  uint64 customer_id = 1;
}

message GetCustomerResponse {
  uint64 id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string first_name = 5;
  string last_name = 6;
  bool is_active = 7;
  repeated uint64 role_ids = 8;
}

message GetCustomerAddressesRequest {
  uint64 customer_id = 1;
}

message GetCustomerAddressesResponse {
  repeated Address addresses = 1;
}

message Address {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string country = 6;
  string state = 7;
  string city = 8;
  string address1 = 9;
  string address2 = 10;
  string zip_code = 11;
  bool is_default_billing = 12;
  bool is_default_shipping = 13;
}