# Grafana 数据源自动配置
apiVersion: 1

datasources:
  # Prometheus 数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      httpMethod: 'POST'

  # Jaeger 数据源（追踪）
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true

  # MySQL 数据源（可选）
  - name: MySQL
    type: mysql
    access: proxy
    url: mysql:3306
    user: root
    jsonData:
      database: nop_db
    secureJsonData:
      password: nop123456
    editable: false