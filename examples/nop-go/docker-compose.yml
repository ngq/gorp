# nop-go 微服务 Docker Compose 配置
# 包含所有微服务、基础设施和 Swagger 文档服务
#
# 使用方法:
#   docker-compose up -d              # 启动所有服务
#   docker-compose up -d mysql redis  # 仅启动基础设施
#   docker-compose logs -f gateway    # 查看网关日志
#   docker-compose down               # 停止所有服务

services:
  # ========== 基础设施 ==========

  # MySQL 数据库 (使用 13306 端口避免与本地 MySQL 冲突)
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: nop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nop123456}
      MYSQL_DATABASE: nop_db
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql/init:/docker-entrypoint-initdb.d:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nop-network

  # Redis 缓存 (使用 16379 端口避免与本地 Redis 冲突)
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: nop-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nop-network

  # ========== 微服务 ==========

  # API 网关 (端口 8000)
  gateway:
    build:
      context: ../..
      dockerfile: examples/nop-go/Dockerfile
      args:
        SERVICE_NAME: gateway-service
    container_name: nop-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENABLE_SWAGGER=true
    volumes:
      - ./services/gateway-service/config:/app/config:ro
    depends_on:
      - customer
      - catalog
      - cart
      - order
    networks:
      - nop-network

  # 后台管理服务 (端口 8001)
  admin:
    build:
      context: ../..
      dockerfile: examples/nop-go/Dockerfile
      args:
        SERVICE_NAME: admin-service
    container_name: nop-admin
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-nop123456}
      - DB_NAME=nop_admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - ENABLE_SWAGGER=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nop-network

