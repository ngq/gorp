version: "3.9"

# ============================================================
# nop-go 微服务平台 Docker Compose 配置
# 包含 20 个微服务 + 基础设施组件
# ============================================================

services:
  # ----------------------------------------------------------
  # 基础设施服务
  # ----------------------------------------------------------

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: nop-go-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nop_platform
      MYSQL_USER: nop_user
      MYSQL_PASSWORD: nop_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init_databases.sql:/docker-entrypoint-initdb.d/init_databases.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: nop-go-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: nop-go-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP 收集端点
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nop-go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: nop-go-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ----------------------------------------------------------
  # 业务微服务 (HTTP: 8081-8100, gRPC: 9081-9100)
  # ----------------------------------------------------------

  # 1. 用户服务 (User Service)
  user-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.user
    container_name: nop-go-user
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nop_user
      DB_PASSWORD: nop_pass
      DB_NAME: nop_user
      REDIS_ADDR: redis:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 2. 订单服务 (Order Service)
  order-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.order
    container_name: nop-go-order
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nop_user
      DB_PASSWORD: nop_pass
      DB_NAME: nop_order
      REDIS_ADDR: redis:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      USER_SERVICE_ADDR: user-service:9081
      PRODUCT_SERVICE_ADDR: product-service:9083
      PAYMENT_SERVICE_ADDR: payment-service:9084
      SHIPPING_SERVICE_ADDR: shipping-service:9085
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  # 3. 商品服务 (Product Service)
  product-service:
    build:
