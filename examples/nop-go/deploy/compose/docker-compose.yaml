      DB_PASSWORD: nop_pass
      DB_NAME: nop_product
      REDIS_ADDR: redis:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      MEDIA_SERVICE_ADDR: media-service:9088
      DISCOUNT_SERVICE_ADDR: discount-service:9086
    depends_on:
      mysql:
        condition: service_healthy
      redis:
