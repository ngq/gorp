  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  media_storage:
    driver: local
  plugin_storage:
    driver: local

# ----------------------------------------------------------
# 网络配置
# ----------------------------------------------------------
networks:
  default:
    name: nop-go-network
    driver: bridge
