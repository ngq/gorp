# ============================================================
# Grafana Dashboard 自动配置
# 自动加载 dashboards 目录下的仪表板
# ============================================================
apiVersion: 1

providers:
  - name: 'nop-go-dashboards'
    orgId: 1
    folder: 'nop-go'
    folderUid: 'nop-go'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
