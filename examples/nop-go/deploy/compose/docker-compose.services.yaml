# nop-go 微服务平台 Docker Compose 配置
#
# 使用外部 MySQL 和 Redis：
# - MySQL: 192.168.3.250:3306 (admin/123456)
# - Redis: 192.168.3.250:6379
#
# 启动方式：在项目根目录执行 docker-compose -f docker-compose.services.yaml up -d
# 构建上下文：项目根目录（gin_plantfrom），Dockerfile 从根目录复制框架源码

services:
  # ----------------------------------------------------------
  # 监控与追踪基础设施
  # ----------------------------------------------------------

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: nop-go-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP 收集端点
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nop-go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: nop-go-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ----------------------------------------------------------
  # 业务微服务 (6 个领域服务)
  # 数据库配置通过环境变量指向外部 MySQL
  # ----------------------------------------------------------

  # 1. 用户服务 (User Service) - 用户 + GDPR
  user-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.user-service
    container_name: nop-go-user
    ports:
      - "8081:8081"
      - "9081:9081"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_user
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 2. 商品服务 (Catalog Service) - 商品 + 目录 + 媒体 + SEO
  catalog-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.catalog-service
    container_name: nop-go-catalog
    ports:
      - "8082:8082"
      - "9082:9082"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_catalog
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 3. 交易服务 (Trade Service) - 订单 + 支付 + 物流 + 税务
  trade-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.trade-service
    container_name: nop-go-trade
    ports:
      - "8083:8083"
      - "9083:9083"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_trade
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      # gRPC 服务间调用地址
      USER_SERVICE_GRPC_ADDR: user-service:9081
      CATALOG_SERVICE_GRPC_ADDR: catalog-service:9082
      ADMIN_SERVICE_GRPC_ADDR: admin-service:9085
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - user-service
      - catalog-service
      - admin-service
    restart: unless-stopped

  # 4. 内容服务 (Content Service) - 内容 + 本地化 + 联盟
  content-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.content-service
    container_name: nop-go-content
    ports:
      - "8084:8084"
      - "9084:9084"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_content
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      # gRPC 服务间调用地址
      CATALOG_SERVICE_GRPC_ADDR: catalog-service:9082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - catalog-service
    restart: unless-stopped

  # 5. 后台管理服务 (Admin Service) - 权限 + 插件 + 店铺 + 日志 + 折扣 + 供应商
  admin-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.admin-service
    container_name: nop-go-admin
    ports:
      - "8085:8085"
      - "9085:9085"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_admin
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      # gRPC 服务间调用地址
      USER_SERVICE_GRPC_ADDR: user-service:9081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - user-service
    restart: unless-stopped

  # 6. 消息服务 (Message Service) - 消息模板
  message-service:
    build:
      context: ../../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.message-service
    container_name: nop-go-message
    ports:
      - "8086:8086"
      - "9086:9086"  # gRPC 端口
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_message
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# ----------------------------------------------------------
# 数据卷定义
# ----------------------------------------------------------
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ----------------------------------------------------------
# 网络配置
# ----------------------------------------------------------
networks:
  default:
    name: nop-go-network
    driver: bridge