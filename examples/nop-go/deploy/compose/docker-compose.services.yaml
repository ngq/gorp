# nop-go 微服务平台 Docker Compose 配置
#
# 使用外部 MySQL 和 Redis：
# - MySQL: 192.168.3.250:3306 (admin/123456)
# - Redis: 192.168.3.250:6379 (如有)
#
# 启动方式：docker-compose -f docker-compose.services.yaml up -d

services:
  # ----------------------------------------------------------
  # 监控与追踪基础设施
  # ----------------------------------------------------------

  # Jaeger 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: nop-go-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP 收集端点
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nop-go-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.2
    container_name: nop-go-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ----------------------------------------------------------
  # 业务微服务 (HTTP: 8081-8100)
  # 数据库配置通过环境变量指向外部 MySQL
  # ----------------------------------------------------------

  # 1. 用户服务 (User Service)
  user-service:
    build:
      context: ../../..
      dockerfile: examples/nop-go/deploy/docker/Dockerfile.user
    container_name: nop-go-user
    ports:
      - "8081:8081"
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_user
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 2. 订单服务 (Order Service)
  order-service:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.order
    container_name: nop-go-order
    ports:
      - "8082:8082"
    environment:
      APP_ENV: production
      DB_HOST: 192.168.3.250
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "123456"
      DB_NAME: nop_order
      REDIS_ADDR: 192.168.3.250:6379
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      USER_SERVICE_ADDR: user-service:8081
      PRODUCT_SERVICE_ADDR: product-service:8083
      PAYMENT_SERVICE_ADDR: payment-service:8084
      SHIPPING_SERVICE_ADDR: shipping-service:8085
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - user-service
    restart: unless-stopped

  # 3. 商品服务 (Product Service)
