syntax = "proto3";

package gorp.test;

option go_package = "github.com/ngq/gorp/test/integration/pb;pb";

// TestService 用于集成测试的 mock gRPC 服务
service TestService {
  // SayHello 简单请求-响应测试
  rpc SayHello(HelloRequest) returns (HelloResponse);

  // Echo 返回请求内容，用于测试 metadata/tracing 传播
  rpc Echo(EchoRequest) returns (EchoResponse);

  // StreamTest 流式测试
  rpc StreamTest(StreamRequest) returns (stream StreamResponse);
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
  string trace_id = 2;  // 返回收到的 trace-id
  string request_id = 3;  // 返回收到的 request-id
}

message EchoRequest {
  string body = 1;
}

message EchoResponse {
  string body = 1;
  map<string, string> metadata = 2;  // 返回收到的 metadata
}

message StreamRequest {
  int32 count = 1;
}

message StreamResponse {
  int32 index = 1;
  string message = 2;
}