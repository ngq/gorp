# gorp 深度集成测试环境
# 用于测试 gRPC/etcd/Redis/tracing/Consul/Nacos/Kafka 等真实 backend 端到端场景

services:
  # etcd - 服务注册发现测试
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    container_name: gorp-test-etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/tmp/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis - 消息队列测试
  redis:
    image: redis:7-alpine
    container_name: gorp-test-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Consul - 服务注册发现测试
  consul:
    image: hashicorp/consul:1.18
    container_name: gorp-test-consul
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -bind=0.0.0.0 -data-dir=/consul/data
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Nacos - 服务注册发现测试
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: gorp-test-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - EMBEDDED_STORAGE=embedded
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Zookeeper - Kafka 依赖
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: gorp-test-zookeeper
    ports:
      - "2181:2181"

  # Kafka - 消息队列测试
  kafka:
    image: wurstmeister/kafka:latest
    container_name: gorp-test-kafka
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Mock gRPC Backend - gRPC 全链路测试
  mock-grpc-backend:
    build:
      context: ./mock_backend
      dockerfile: Dockerfile.mock
    container_name: gorp-test-grpc-backend
    ports:
      - "50051:50051"
    environment:
      - GORP_TEST_TRACING_ENABLED=true
      - GORP_TEST_ETCD_ADDR=etcd:2379
    depends_on:
      etcd:
        condition: service_healthy

  # Jaeger - tracing 收集测试
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: gorp-test-jaeger
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # 测试执行容器
  test-runner:
    build:
      context: ../../
      dockerfile: test/integration/Dockerfile.test
    container_name: gorp-test-runner
    command: go test -tags=integration -v ./test/integration/...
    depends_on:
      etcd:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-grpc-backend:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      - GORP_TEST_ETCD_ADDR=etcd:2379
      - GORP_TEST_REDIS_ADDR=redis:6379
      - GORP_TEST_CONSUL_ADDR=consul:8500
      - GORP_TEST_NACOS_ADDR=nacos:8848
      - GORP_TEST_KAFKA_ADDR=kafka:9092
      - GORP_TEST_GRPC_BACKEND_ADDR=mock-grpc-backend:50051
      - GORP_TEST_JAEGER_ADDR=jaeger:4317
    volumes:
      - ../../:/gorp  # 挂载项目代码用于测试